name: GHOST Parameter and Claims Lock

on:
  pull_request:
    paths:
      - 'ghost_sim_ros2/tools/parameter_lock.py'
      - 'ghost_sim_ros2/analysis/validate_release_claims.py'
      - 'ghost_sim_ros2/test/test_parameter_claims_lock.py'
      - 'ghost_sim_ros2/docs/RELEASE_CLAIMS_MATRIX.example.json'
      - 'ghost_sim_ros2/docs/GHOST_PARAMETER_LOCK.md'
      - 'ghost_sim_ros2/docs/GHOST_RELEASE_CLAIMS_REVIEW.md'
      - '.github/workflows/parameter-claims-lock.yml'
  workflow_dispatch:

jobs:
  parameter-claims-lock:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependency
        run: python -m pip install --upgrade pip pytest

      - name: Compile lock and claims tools
        run: |
          python -m py_compile \
            ghost_sim_ros2/tools/parameter_lock.py \
            ghost_sim_ros2/analysis/validate_release_claims.py \
            ghost_sim_ros2/test/test_parameter_claims_lock.py

      - name: Validate current prevalidation claims matrix
        run: |
          python ghost_sim_ros2/analysis/validate_release_claims.py \
            ghost_sim_ros2/docs/RELEASE_CLAIMS_MATRIX.example.json

      - name: Run focused parameter and claims tests
        run: |
          PYTHONPATH=ghost_sim_ros2:ghost_sim_ros2/tools \
          python -m pytest -q ghost_sim_ros2/test/test_parameter_claims_lock.py
