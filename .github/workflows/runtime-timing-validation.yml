name: GHOST Runtime and Timing Validation

on:
  pull_request:
    paths:
      - 'ghost_sim_ros2/analysis/camera_timing_analysis.py'
      - 'ghost_sim_ros2/tools/runtime_resource_logger.py'
      - 'ghost_sim_ros2/test/test_runtime_timing_validation.py'
      - 'ghost_sim_ros2/docs/GHOST_RUNTIME_TIMING_VALIDATION.md'
      - '.github/workflows/runtime-timing-validation.yml'
  workflow_dispatch:

jobs:
  runtime-timing-validation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: python -m pip install --upgrade pip pytest matplotlib

      - name: Compile timing and runtime tools
        run: |
          python -m py_compile \
            ghost_sim_ros2/analysis/camera_timing_analysis.py \
            ghost_sim_ros2/tools/runtime_resource_logger.py \
            ghost_sim_ros2/test/test_runtime_timing_validation.py

      - name: Run focused timing and runtime tests
        run: |
          PYTHONPATH=ghost_sim_ros2:ghost_sim_ros2/tools \
          python -m pytest -q ghost_sim_ros2/test/test_runtime_timing_validation.py
