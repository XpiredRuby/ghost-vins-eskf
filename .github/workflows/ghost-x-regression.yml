name: GHOST-X Regression

on:
  push:
    branches: [ghost-x]
  pull_request:
    branches: [ghost-x, main]
  workflow_dispatch:

jobs:
  deterministic-software-regression:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install C++ dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake libeigen3-dev libgtest-dev

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy scipy pyyaml matplotlib jsonschema pytest

      - name: Build C++ estimators
        run: |
          cmake -S ghost_sim_ros2/cpp/ghost_x_estimators \
            -B /tmp/ghost_x_cpp_build \
            -DGHOST_X_BUILD_TESTS=ON \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build /tmp/ghost_x_cpp_build --parallel 2

      - name: Run deterministic replay and regression gates
        run: |
          python ghost_sim_ros2/tools/run_ghost_x_g10_ci.py \
            --acceptance ghost_sim_ros2/config/ghost_x_g10_acceptance.yaml \
            --repo-root "$GITHUB_WORKSPACE" \
            --cpp-build-dir /tmp/ghost_x_cpp_build \
            --out-dir /tmp/ghost_x_g10

      - name: Upload regression report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ghost-x-g10-regression
          path: /tmp/ghost_x_g10
          retention-days: 14
