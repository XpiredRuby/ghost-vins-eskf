name: GHOST Campaign Operations

on:
  pull_request:
    paths:
      - 'ghost_sim_ros2/tools/campaign_operations.py'
      - 'ghost_sim_ros2/tools/trial_conductor.py'
      - 'ghost_sim_ros2/test/test_campaign_operations.py'
      - 'ghost_sim_ros2/docs/GHOST_CAMPAIGN_OPERATIONS.md'
      - '.github/workflows/campaign-operations.yml'
  workflow_dispatch:

jobs:
  campaign-operations:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependency
        run: python -m pip install --upgrade pip pytest

      - name: Compile campaign tools
        run: |
          python -m py_compile \
            ghost_sim_ros2/tools/campaign_operations.py \
            ghost_sim_ros2/tools/trial_conductor.py \
            ghost_sim_ros2/test/test_campaign_operations.py

      - name: Run focused campaign operations tests
        run: |
          PYTHONPATH=ghost_sim_ros2:ghost_sim_ros2/tools \
          python -m pytest -q ghost_sim_ros2/test/test_campaign_operations.py
