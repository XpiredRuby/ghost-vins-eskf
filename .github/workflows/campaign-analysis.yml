name: GHOST Campaign Analysis

on:
  pull_request:
    paths:
      - 'ghost_sim_ros2/analysis/campaign_analysis.py'
      - 'ghost_sim_ros2/analysis/grid_validation_visuals.py'
      - 'ghost_sim_ros2/test/test_campaign_analysis_visuals.py'
      - 'ghost_sim_ros2/docs/GHOST_CAMPAIGN_ANALYSIS.md'
      - '.github/workflows/campaign-analysis.yml'
  workflow_dispatch:

jobs:
  campaign-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: python -m pip install --upgrade pip pytest matplotlib scipy

      - name: Compile analysis tools
        run: |
          python -m py_compile \
            ghost_sim_ros2/analysis/campaign_analysis.py \
            ghost_sim_ros2/analysis/grid_validation_visuals.py \
            ghost_sim_ros2/test/test_campaign_analysis_visuals.py

      - name: Run focused campaign and grid visual tests
        run: |
          PYTHONPATH=ghost_sim_ros2 \
          python -m pytest -q ghost_sim_ros2/test/test_campaign_analysis_visuals.py
