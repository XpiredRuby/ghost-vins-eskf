name: GHOST CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y cmake libeigen3-dev libgtest-dev python3 python3-pip
          python3 -m pip install --upgrade pip
          python3 -m pip install numpy matplotlib pytest

      - name: Validate interactive showcase JavaScript
        run: node --check ghost_sim_ros2/docs/assets/showcase.js

      - name: Run Python unit tests
        run: |
          cd ghost_sim_ros2
          PYTHONPATH="$PWD" python3 -m pytest -q \
            test/test_stationary_noise_analysis.py \
            test/test_stationary_gate.py \
            test/test_measurement_r.py \
            test/test_observability_crlb.py \
            test/test_imm_tracker.py \
            test/test_stats_harness.py \
            test/test_tracker_comparison.py \
            test/test_grid_validation_analysis.py \
            test/test_statistical_comparison.py \
            test/test_export_demo_artifact.py \
            test/test_public_results_package.py \
            test/test_interactive_showcase.py

      - name: Verify public results data are reproducible
        run: |
          python3 ghost_sim_ros2/tools/generate_public_results.py
          python3 ghost_sim_ros2/tools/generate_interactive_showcase_data.py --skip-replay-if-missing
          # Matplotlib raster/SVG geometry varies by renderer and font version.
          # Tests validate every committed plot structurally; exact gates cover
          # source-backed JSON, CSV, and the interactive evidence checklist.
          git diff --exit-code -- \
            ghost_sim_ros2/docs/GHOST_PUBLIC_RESULTS_SUMMARY.json \
            ghost_sim_ros2/docs/GHOST_PUBLIC_RESULTS_TABLE.csv \
            ghost_sim_ros2/docs/GHOST_INTERACTIVE_EVIDENCE_CHECKLIST.md \
            ghost_sim_ros2/docs/data/GHOST_INTERACTIVE_SHOWCASE_DATA.json

      - name: Run interactive showcase browser smoke
        run: python3 ghost_sim_ros2/test/showcase_browser_smoke.py

      - name: Build portable C++ core
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DGHOST_BUILD_ROS2_NODES=OFF
          cmake --build build --parallel

      - name: Run C++ unit tests
        run: |
          cd build
          ctest --output-on-failure

  nis_gate_attitude:
    runs-on: ubuntu-22.04
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python and scipy
        run: |
          sudo apt-get update -y
          sudo apt-get install -y python3 python3-pip
          python3 -m pip install scipy

      - name: NIS gate attitude
        run: |
          if [ ! -f logs/nis_camera_gravity.csv ]; then
            echo "Skipping NIS gate: logs/nis_camera_gravity.csv is not present."
            exit 0
          fi
          python3 analysis/nis_validation.py --log logs/nis_camera_gravity.csv --dof 3 --confidence 0.95 --fail-on-violation

  nis_gate_cv:
    runs-on: ubuntu-22.04
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python and scipy
        run: |
          sudo apt-get update -y
          sudo apt-get install -y python3 python3-pip
          python3 -m pip install scipy

      - name: NIS gate CV
        run: |
          if [ ! -f logs/nis_cv_tracker.csv ]; then
            echo "Skipping NIS gate: logs/nis_cv_tracker.csv is not present."
            exit 0
          fi
          python3 analysis/nis_validation.py --log logs/nis_cv_tracker.csv --dof 3 --confidence 0.95 --fail-on-violation

  nis_gate_ctrv:
    runs-on: ubuntu-22.04
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python and scipy
        run: |
          sudo apt-get update -y
          sudo apt-get install -y python3 python3-pip
          python3 -m pip install scipy

      - name: NIS gate CTRV
        run: |
          if [ ! -f logs/nis_ctrv_tracker.csv ]; then
            echo "Skipping NIS gate: logs/nis_ctrv_tracker.csv is not present."
            exit 0
          fi
          python3 analysis/nis_validation.py --log logs/nis_ctrv_tracker.csv --dof 2 --confidence 0.95 --fail-on-violation
