# ── config/imu.yaml ────────────────────────────────────────────────────────────
# IMU hardware parameters for GHOST camera platform (static tripod)
# Source: GHOST_V10.md §IMU Driver, ICM-42688-P datasheet DS-000347
#
# IMPORTANT: All noise values must be confirmed from a 4-hour Allan Variance run
# before Phase 3. Values marked "# MEASURE" are datasheet-typical placeholders only.
# See GHOST_V10.md §Development Phases — Phase 1 exit criteria.

# ── Primary IMU: ICM-42688-P ─────────────────────────────────────────────────
icm42688p:
  interface:        spi
  spi_device:       /dev/spidev0.0
  spi_clock_hz:     10000000        # 10 MHz — max rated for ICM-42688-P (DS-000347 §4.1)
  odr_hz:           1000            # GHOST_V10.md: "SPI 1000Hz"
  drdy_gpio:        17              # GHOST_V10.md: "DRDY GPIO17 ISR → CLOCK_MONOTONIC"
  who_am_i_expected: 0x47           # GHOST_V10.md: "must return 0x47" — halt at startup if wrong

  gyro:
    # ARW taken directly from GHOST_V10.md: "2.8 mdps/√Hz ARW"
    # Used to derive: sigma_gyro (ZARU R_zaru) and Q_g (ESKF process noise)
    # sigma_gyro_rad_per_s = arw_deg_per_sqrthz * sqrt(rate_hz) * pi/180
    # At 1 Hz ZARU rate: sigma_gyro ≈ 0.0028 * 1.0 * 0.017453 ≈ 4.9e-5 rad/s
    arw_deg_per_sqrthz:        0.0028    # GHOST_V10.md §IMU Driver — confirmed spec value
    bias_instability_deg_per_hr: 0.9     # ~0.9 °/hr typical (DS-000347) — MEASURE FROM ALLAN VARIANCE

  accel:
    # ICM-42688-P datasheet typical values — MEASURE FROM ALLAN VARIANCE (Phase 1)
    noise_density_ug_per_sqrthz: 70.0   # ~70 μg/√Hz typical (DS-000347 §3.1) — MEASURE
    bias_instability_ug:         20.0   # ~20 μg typical (DS-000347) — MEASURE
    full_scale_g:                16     # ±16 g configured for RC car floor scenario

  timestamp:
    # Strobe ISR (not this IMU's DRDY) provides camera-IMU alignment
    # See camera.yaml for strobe_gpio configuration
    clock_source:     CLOCK_MONOTONIC   # latched at DRDY interrupt edge
    max_jitter_us:    50                # GHOST_V10.md: "PREEMPT_RT < 50μs" (FMEA, Phase 1 exit)

# ── Watchdog IMU: MPU-6050 ───────────────────────────────────────────────────
mpu6050:
  interface:     i2c
  i2c_bus:       1
  i2c_address:   0x68              # MPU-6050 default (AD0 pin pulled low)
  odr_hz:        400               # GHOST_V10.md: "I2C 400Hz + DRDY ISR"
  drdy_gpio:     27                # GHOST_V10.md: "DRDY GPIO27 ISR"
  role:          watchdog_only     # NEVER enters target tracking propagation — strapdown constraint

  fault_detection:
    # GHOST_V10.md: "Run both IMUs through independent attitude integration.
    # Compute angular disagreement: theta_err = 2*arccos(|delta_q.w|)
    # 100ms moving window — fault if mean(theta_err) > 3× 99th percentile baseline"
    method:                       attitude_disagreement   # NOT raw IMU threshold — see FMEA
    window_ms:                    100                    # GHOST_V10.md: "100ms moving window"
    fault_threshold_multiplier:   3.0                    # 3× 99th percentile baseline
    fault_timeout_ms:             100                    # fault clears if transient < 100ms

    # Numerical thresholds below must be characterized from a 10-minute static run (Phase 1).
    # Do NOT use these as absolute values — the multiplier-based rule above governs.
    accel_disagreement_threshold_m_per_s2:   1.0    # secondary plausibility check — CHARACTERIZE
    rate_disagreement_threshold_rad_per_s:   0.05   # secondary plausibility check — CHARACTERIZE

    fault_action:   warn_only      # Primary (ICM-42688-P) always trusted — MPU-6050 fault = warning
