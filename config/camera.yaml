# ── config/camera.yaml ─────────────────────────────────────────────────────────
# USB UVC webcam parameters (V12 baseline)
# Source: GHOST_V12_USB_WEBCAM.md §Vision Pipeline, §Hardware
#
# Intrinsic parameters are PLACEHOLDERS — replace with values from a physical
# calibration run (Phase 2 exit: reprojection error < 0.5 px).
# Any intrinsic value below marked "# CALIBRATE" is NOT a real measurement.

sensor:
  model:      USB_UVC_webcam
  interface:  UVC                    # V4L2 userspace capture
  v4l2_device: /dev/video0          # default UVC node — verify with v4l2-ctl --list-devices
  # Baseline capture resolution (GHOST_V12_USB_WEBCAM.md: "640×480 @ 30 fps baseline")
  width_px:   640
  height_px:  480
  pixel_format: MJPEG               # prefer MJPEG for USB bandwidth; YUYV also supported
  target_fps: 30
  # Rolling-shutter UVC: exposure as short as practicable; RC car speed limited (VV-26)
  max_exposure_ms: 10.0
  auto_gain: true

decimation:
  # Optional downscale if capturing above processing budget (e.g. 1280×720 native)
  # factor: 1 → no decimation; K_scaled = K_intrinsic at capture resolution
  factor:   1
  width_px:  640                      # must match effective processing resolution
  height_px: 480
  # K_scaled = K_intrinsic / factor (fx, fy, cx, cy all divided by factor when factor > 1)
  # Do NOT use full-resolution K on a decimated frame — depth will be wrong.

timestamp:
  # V12 baseline: V4L2 buffer timestamp + ESKF OOSM rollback (measured latency)
  # GHOST_V12_USB_WEBCAM.md: "measure pipeline latency in Phase 2; do NOT assume"
  source:              v4l2_buffer_timestamp
  oosm_rollback_enabled: true
  pipeline_latency_ms: null           # MEASURE in Phase 2 — feeds OOSM buffer sizing
  clock_source:        CLOCK_MONOTONIC  # same timebase as ICM-42688-P DRDY ISR

  # Optional future work — IMX296 global shutter hardware sync (Phase 5, not baseline)
  # GHOST_V12_USB_WEBCAM.md §Optional Hardware Upgrade; legacy detail in GHOST_V10.md
  strobe_enabled:  false
  strobe_gpio:     22                 # GPIO22 ISR — only when strobe_enabled: true

# ── Camera intrinsics ─────────────────────────────────────────────────────────
# ALL values below are PLACEHOLDERS. Replace with output from camera calibration
# (e.g. ROS2 camera_calibration package or OpenCV calibrateCamera).
# Calibrate at the resolution used for AprilTag detection (640×480 baseline).
intrinsics:
  fx: 500.0    # CALIBRATE — focal length x [pixels] at capture resolution
  fy: 500.0    # CALIBRATE — focal length y [pixels]
  cx: 320.0    # CALIBRATE — principal point x [pixels]
  cy: 240.0    # CALIBRATE — principal point y [pixels]

  distortion:
    k1: 0.0  # CALIBRATE
    k2: 0.0  # CALIBRATE
    p1: 0.0  # CALIBRATE
    p2: 0.0  # CALIBRATE

# ── ROI (Region of Interest) — Tier 2 detection ──────────────────────────────
# GHOST_V12_USB_WEBCAM.md: "Tier 2: 300×300 ROI at predicted pixel"
# ROI projection MUST use K_scaled (not unscaled K) and subtract crop origin from cx, cy
roi:
  width_px:   300
  height_px:  300

# ── AprilTag ──────────────────────────────────────────────────────────────────
apriltag:
  family:          36h11
  tag_id:          0
  tag_size_m:      0.10         # 10 cm physical side length

  operating_envelope:
    range_min_m:         0.5
    range_max_m:         3.0
    max_oblique_angle_deg: 45
    min_illumination_lux:  50

  # Detection rate targets (GHOST_V12_USB_WEBCAM.md §Vision Pipeline)
  target_fps_full_frame: 20    # ≥ 20 fps on 640×480 UVC baseline (Pi 4B)
  target_fps_roi_frame:  30    # ≥ 30 fps on 300×300 ROI crop

# ── Optical flow ──────────────────────────────────────────────────────────────
optical_flow:
  method:  lucas_kanade
  enabled: true

# ── Optional IMX296 CSI upgrade profile (future work — not loaded by default) ─
# Uncomment and swap sensor block above when pursuing Phase 5 global-shutter upgrade.
