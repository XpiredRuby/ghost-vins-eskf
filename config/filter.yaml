# ── config/filter.yaml ─────────────────────────────────────────────────────────
# Tuning parameters for both GNC filters
# Source: GHOST_V10.md §GNC Mathematics, §IMU Driver, §NIS-Gated CI Pipeline
#
# Values derived from spec are noted with their source.
# Values marked "# TUNE" must be set after Allan Variance and RC car characterization runs.
# GHOST_V10.md: "Never claim a number not yet measured."

# ══════════════════════════════════════════════════════════════════════════════
# FILTER 1 — 9-State Attitude ESKF (src/attitude_filter/)
# Runs at 1000 Hz, driven by ICM-42688-P SPI + DRDY ISR
# State: [q_cam, b_a, b_g]   Error-state: [delta_theta(3), delta_b_a(3), delta_b_g(3)]
# ══════════════════════════════════════════════════════════════════════════════
eskf:
  rate_hz: 1000                   # GHOST_V10.md: "9-state ESKF @ 1000Hz"
  gravity_magnitude_m_per_s2: 9.81  # GHOST_V10.md §GNC Mathematics

  process_noise:
    # Q_g — gyro noise driving delta_b_g random walk
    # Derived from Allan Variance ARW: sigma_g = ARW_rad_per_s_per_sqrthz
    # arw_deg_per_sqrthz = 0.0028  →  sigma_g = 0.0028 * pi/180 = 4.887e-5 rad/s/√Hz
    # Set from imu.yaml arw after Allan Variance run (Phase 1 exit criteria)
    sigma_g_rad_per_s_per_sqrthz: 4.887e-5   # GHOST_V10.md: "2.8 mdps/√Hz ARW" → converted
    sigma_a_m_per_s2_per_sqrthz:  0.0025      # accel bias random walk — TUNE FROM ALLAN VARIANCE

  initial_covariance:
    # Diagonal P0 — inflate generously; ESKF converges from gravity vector in ~1s
    delta_theta_rad:    0.1      # ~6° initial attitude uncertainty — TUNE
    delta_b_a_m_per_s2: 0.05    # initial accel bias uncertainty — TUNE
    delta_b_g_rad_per_s: 1.0e-3 # initial gyro bias uncertainty — TUNE

  gravity_update:
    # Measurement noise for accelerometer-as-gravity-direction update
    # Separate from process noise sigma_a — this is measurement, not bias random walk
    sigma_accel_meas_m_per_s2: 0.30   # TUNE — tighter on smooth floor, looser with vibration

  # ── Sage-Husa Adaptive Noise ───────────────────────────────────────────────
  sage_husa:
    forgetting_factor: 0.98       # GHOST_V10.md: "d_k" — spec-mandated value
    # Eigenvalue floor prevents R_hat from going negative definite
    # GHOST_V10.md FMEA: "Eigenvalue floor clamp after every update"
    r_min_eigenvalue: 1.0e-6      # floor — TUNE if Sage-Husa diverges

  # ── ZARU — Zero Angular Rate Update ───────────────────────────────────────
  zaru:
    rate_hz: 1.0                  # GHOST_V10.md: "ZARU @ 1Hz"
    # Motion gate: suspend ZARU if platform is accelerating
    # GHOST_V10.md: "Gate: suspend if |accel_norm - 9.81| > 0.5 m/s²"
    accel_gate_m_per_s2: 0.5      # GHOST_V10.md — spec-mandated value

    # R_zaru: derived from Allan Variance ARW
    # GHOST_V10.md: "sigma_gyro = ARW × sqrt(rate_hz) × π/180 ≈ 4.9e-5 rad/s"
    # sigma_gyro = 0.0028 * sqrt(1.0) * pi/180 = 4.887e-5 rad/s
    # R_zaru = sigma_gyro² * I3  →  diagonal element = (4.887e-5)² ≈ 2.39e-9 rad²/s²
    # GHOST_V10.md: "R_zaru = diag(sigma_gyro²) — never guess"
    arw_deg_per_sqrthz: 0.0028    # mirrors imu.yaml; R_zaru computed at runtime from this

  # ── NIS Logging (gravity update only — NOT ZARU) ──────────────────────────
  nis:
    log_file:   logs/nis_camera_gravity.csv
    dof:        3           # chi²(3) — 3D innovation (GHOST_V10.md §NIS-Gated CI)
    confidence: 0.95        # GHOST_V10.md — spec-mandated value
    # nis_camera_zaru.csv logged separately — NOT CI-gated
    # GHOST_V10.md: "ZARU fires at 1Hz on static platform only — not valid for dynamic chi²(3)"
    zaru_log_file: logs/nis_camera_zaru.csv

# ══════════════════════════════════════════════════════════════════════════════
# FILTER 2 — CV/CTRV Target Tracking Filter (src/target_tracker/)
# Runs at vision frame rate (~25–45 fps)
# IMU data NEVER enters this filter — strapdown constraint
# ══════════════════════════════════════════════════════════════════════════════

# ── CV Filter (Constant Velocity, 6-state EKF) ────────────────────────────
cv_filter:
  # State: [p_x, p_y, p_z, v_x, v_y, v_z]^T
  process_noise:
    # Singer model: Q from measured RC car a_max
    # GHOST_V10.md: "Q_target from Singer model: sigma_a² = 2*alpha*a_max²/3"
    # Both alpha and a_max measured in Phase 3 — TUNE after RC car characterization
    singer_alpha:                 2.0    # maneuver bandwidth [1/s] — TUNE
    singer_a_max_m_per_s2:        2.0    # measured RC car peak acceleration — TUNE
    # sigma_a² = 2 * alpha * a_max² / 3  →  computed at runtime from above

  measurement_noise:
    # Position measurement noise — AprilTag PnP reprojection uncertainty
    # Tighten after camera calibration (Phase 2 exit: reprojection error < 0.5px)
    sigma_r_m: 0.02    # ~2 cm — TUNE after Phase 2 calibration

  initial_covariance:
    pos_m:       0.10    # initial position uncertainty [m] — TUNE
    vel_m_per_s: 0.50    # initial velocity uncertainty [m/s] — TUNE

  # ── NIS Logging (CV filter — chi²(3)) ─────────────────────────────────────
  # CV NIS is 3-DOF: 3D position measurement [px, py, pz]
  nis:
    log_file:   logs/nis_cv_tracker.csv
    dof:        3       # chi²(3) — 3D position measurement (H is 3×6)
    confidence: 0.95    # GHOST_V10.md — spec-mandated value

# ── CTRV Filter (Constant Turn Rate and Velocity, 5-state UKF) ─────────────
ctrv_filter:
  # State: [p_x, p_y, v, psi, psi_dot]^T
  process_noise:
    sigma_a_m_per_s2:      0.50    # linear acceleration noise — TUNE
    sigma_psi_dot_rad_per_s: 0.20  # turn rate noise — TUNE

  measurement_noise:
    sigma_r_m: 0.02    # position measurement noise (same source as CV) — TUNE

  initial_covariance:
    pos_m:              0.10    # TUNE
    vel_m_per_s:        0.50    # TUNE
    psi_rad:            0.30    # ~17° initial heading uncertainty — TUNE
    psi_dot_rad_per_s:  0.10    # TUNE

  # ── NIS Logging (CTRV filter — chi²(2)) ───────────────────────────────────
  # CTRV NIS is 2-DOF: 2D position measurement [px, py] — DIFFERENT from CV (3-DOF).
  # Separate file required so the CI gate applies the correct chi² threshold per filter.
  # Using chi²(3) threshold on chi²(2) NIS silently passes inconsistent filter runs
  # (values in (5.991, 7.815] pass the gate but should be flagged).
  nis:
    log_file:   logs/nis_ctrv_tracker.csv
    dof:        2       # chi²(2) — 2D position measurement (h(x) = [px, py])
    confidence: 0.95    # GHOST_V10.md — spec-mandated value

  # Singularity guard — GHOST_V10.md: "|psi_dot| < epsilon → revert to CV equations"
  # This value is loaded by tracker_node and passed to both CTRVFilter::setSingularityGuard()
  # and used as the useCTRV() model-selection threshold — they must stay identical.
  singularity_guard_threshold_rad_per_s: 1.0e-4   # GHOST_V10.md — spec-mandated value

  ukf:
    # GHOST_V10.md (user spec): "UKF parameters: alpha=0.001, kappa=0, beta=2"
    alpha: 0.001
    kappa: 0
    beta:  2

# NOTE: per-filter NIS parameters are now embedded within cv_filter.nis and
# ctrv_filter.nis above.  Each filter has a distinct log file and DOF because
# CV measures 3D position (chi²(3)) and CTRV measures 2D position (chi²(2)).
# The CI pipeline runs two separate NIS gate jobs — see .github/workflows/ci.yml.
